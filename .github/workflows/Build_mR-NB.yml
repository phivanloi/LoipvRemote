name: Build_and_Release_mR-NB_MultiDeploy
on:
  push:
    branches:
      - v1.78.2-dev

  workflow_dispatch:
    inputs:
      release_flag:
        description: 'Run NB release'
        required: false
        default: 'true'

jobs:
  NB-Build-and-Release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # Framework-Dependent builds (requires .NET runtime on user machine)
          - runner: windows-latest
            platform: x64
            arch: x64
            deployment: framework-dependent
            deploy_suffix: FD
          - runner: windows-11-arm
            platform: ARM64
            arch: arm64
            deployment: framework-dependent
            deploy_suffix: FD
          # Self-Contained builds (includes .NET runtime)
          - runner: windows-latest
            platform: x64
            arch: x64
            deployment: self-contained
            deploy_suffix: SC
          - runner: windows-11-arm
            platform: ARM64
            arch: arm64
            deployment: self-contained
            deploy_suffix: SC
    runs-on: ${{ matrix.runner }}
    # Only run if:
    # - manual dispatch, OR
    # - push event AND commit message contains "NB release"
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'NB release'))

    steps:
      - name: (01) Checkout Repository
        uses: actions/checkout@v7

      - name: (02) Select solution file
        shell: pwsh
        run: |
          $solutionPath = Join-Path $env:GITHUB_WORKSPACE 'LoipvRemote.slnx'
          if (-not (Test-Path -LiteralPath $solutionPath)) {
            Write-Host "ERROR: LoipvRemote.slnx was not found." -ForegroundColor Red
            exit 1
          }
          "SOLUTION_FILE=$solutionPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using solution: $solutionPath" -ForegroundColor Green

      - name: (02) Install .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: (03) Cache NuGet Packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ matrix.arch }}-${{ matrix.deployment }}-nuget-${{ hashFiles('global.json', 'LoipvRemote.slnx', '**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-${{ matrix.deployment }}-nuget-
            ${{ runner.os }}-${{ matrix.arch }}-nuget-

      - name: (04) Restore NuGet Packages
        shell: pwsh
        run: dotnet restore $env:SOLUTION_FILE

      - name: (05) Build Framework-Dependent Release
        if: matrix.deployment == 'framework-dependent'
        shell: pwsh
        run: dotnet build $env:SOLUTION_FILE -c Release -p:Platform=${{ matrix.platform }} --no-restore --nologo

      - name: (06) Build Self-Contained Release
        if: matrix.deployment == 'self-contained'
        shell: pwsh
        run: >
          dotnet build LoipvRemote/LoipvRemote.csproj
          -c "Release Self-Contained"
          -p:Platform=${{ matrix.platform }}
          --no-restore
          --self-contained true
          -p:PublishDir="${{ github.workspace }}\\LoipvRemote\\bin\\${{ matrix.platform }}\\Release\\"

      - name: (07) Release Information
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content "${{ github.workspace }}\LoipvRemote\LoipvRemote.csproj"
          $fullVersion = @($project.Project.PropertyGroup | ForEach-Object Version | Where-Object { $_ })[0]
          if ([string]::IsNullOrWhiteSpace($fullVersion)) { throw 'Could not extract Version from LoipvRemote.csproj.' }
          $version = $fullVersion
          $build = $env:GITHUB_RUN_NUMBER
          $date = Get-Date -Format "yyyyMMdd"
          $zipName = "LoipvRemote-$date-v$version-NB-$build-${{ matrix.arch }}-${{ matrix.deploy_suffix }}.zip"
          $tag = "$date-v$version-NB-($build)"
          $message = git log -1 --pretty=%B
          echo "message=$message" >> $env:GITHUB_OUTPUT
          echo "zipname=$zipName" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "build=$build" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "deployment=${{ matrix.deployment }}" >> $env:GITHUB_OUTPUT

      - name: (08) Create Zip File
        shell: pwsh
        run: |
          $sourceDir = "$Env:GITHUB_WORKSPACE\LoipvRemote\bin\${{ matrix.platform }}\Release"
          Compress-Archive -Path "$sourceDir\*" -DestinationPath ${{ steps.version.outputs.zipname }}
          echo "File: ${{ steps.version.outputs.zipname }}"

          # Show file size
          $fileSize = (Get-Item ${{ steps.version.outputs.zipname }}).Length / 1MB
          echo "Size: $([math]::Round($fileSize, 2)) MB"

      - name: (09) Upload artifacts for combination
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}-${{ matrix.deploy_suffix }}
          path: ${{ steps.version.outputs.zipname }}
          retention-days: 1

  Create-Combined-Release:
    needs: NB-Build-and-Release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract version info
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content "${{ github.workspace }}\LoipvRemote\LoipvRemote.csproj"
          $fullVersion = @($project.Project.PropertyGroup | ForEach-Object Version | Where-Object { $_ })[0]
          if ([string]::IsNullOrWhiteSpace($fullVersion)) { throw 'Could not extract Version from LoipvRemote.csproj.' }
          $version = $fullVersion
          $build = $env:GITHUB_RUN_NUMBER
          $date = Get-Date -Format "yyyyMMdd"
          $tag = "$date-v$version-NB-($build)"
          $message = git log -1 --pretty=%B
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "build=$build" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "message=$message" >> $env:GITHUB_OUTPUT

      - name: Collect all release files
        shell: pwsh
        run: |
          Get-ChildItem -Path artifacts -Recurse -Filter "*.zip" | ForEach-Object {
            Copy-Item $_.FullName -Destination .
            echo "Found: $($_.Name)"
          }

      - name: Create combined release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "LoipvRemote ${{ steps.version.outputs.version }} NB ${{ steps.version.outputs.build }}"
          files: '*.zip'
          body: |
            ## LoipvRemote ${{ steps.version.outputs.version }} NB Build ${{ steps.version.outputs.build }}

            ### 📦 Available Downloads

            **Framework-Dependent (FD)** - Requires .NET 10 Runtime installed:
            - Smaller download size (~15-25 MB)
            - Requires .NET 10 Desktop Runtime on user machine
            - Files: `*-FD.zip`

            **Self-Contained (SC)** - Portable, no installation required:
            - Larger download size (~80-150 MB)
            - Includes .NET 10 runtime - no installation needed
            - Files: `*-SC.zip`

            Both versions are available for **x64** and **ARM64** architectures.

            ---

            ### 💬 Last Commit Message
            ${{ steps.version.outputs.message }}

          draft: false
          prerelease: true
