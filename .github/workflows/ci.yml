name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore LoipvRemote.slnx

      - name: Build x64 Release
        run: dotnet build LoipvRemote.slnx -c Release -p:Platform=x64 --no-restore --nologo

      - name: Test x64 Release
        run: >
          dotnet test LoipvRemoteTests/LoipvRemoteTests.csproj
          -c Release
          -p:Platform=x64
          --no-build
          --no-restore
          --filter "FullyQualifiedName!~IntegratedProgramTests"
          --logger "trx;LogFileName=tests.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults
          if-no-files-found: warn

  build-installer:
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: x64
          - runner: windows-11-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore installer dependencies
        run: dotnet restore LoipvRemoteInstaller/Installer/Installer.wixproj

      - name: Build MSI
        run: >
          dotnet build LoipvRemoteInstaller/Installer/Installer.wixproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          --no-restore
          --nologo

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          $msi = Get-ChildItem "LoipvRemoteInstaller\Installer\bin\${{ matrix.platform }}\Release" -Filter '*.msi' | Select-Object -First 1
          if ($null -eq $msi -or $msi.Length -eq 0) {
            throw 'Installer build did not produce a non-empty MSI artifact.'
          }
          Write-Host "Verified $($msi.FullName) ($($msi.Length) bytes)."

      - name: Smoke test install and uninstall
        shell: pwsh
        run: |
          $msi = Get-ChildItem "LoipvRemoteInstaller\Installer\bin\${{ matrix.platform }}\Release" -Filter '*.msi' | Select-Object -First 1
          & .\LoipvRemoteInstaller\Installer\SmokeTest-Installer.ps1 -MsiPath $msi.FullName -InstallDirectory "$env:LOCALAPPDATA\Programs\LoipvRemote" -LogDirectory $env:RUNNER_TEMP

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: loipvremote-installer-${{ matrix.platform }}
          path: LoipvRemoteInstaller/Installer/bin/${{ matrix.platform }}/Release/*.msi
          if-no-files-found: error
